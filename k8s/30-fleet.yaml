apiVersion: v1
kind: Service
metadata: { name: api-gateway, namespace: logging }
spec: { selector: { app: api-gateway }, ports: [ { port: 8000, targetPort: 8000 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: api-gateway, namespace: logging }
spec:
  replicas: 1
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata: { labels: { app: api-gateway } }
    spec:
      containers:
        - name: api-gateway
          image: fleet:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn","api_gateway.main:app","--host","0.0.0.0","--port","8000"]
          env:
            - { name: LOG_DIR, value: /var/log/fleet }
            - { name: AUTH_URL, value: http://auth:8001 }
            - { name: TRIP_URL, value: http://trip:8002 }
            - { name: PAYMENTS_URL, value: http://payments:8003 }
          ports: [ { containerPort: 8000 } ]
          volumeMounts: [ { name: logs, mountPath: /var/log/fleet } ]
        - name: fluent-bit
