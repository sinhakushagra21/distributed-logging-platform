# Mock fleet. Each pod runs the service + a Fluent Bit SIDECAR that tails the
# shared emptyDir log volume and ships to the log-shipper Service. (This is the
# "sidecar collector" pattern; a DaemonSet tailing node logs is the alternative
# — see k8s/README.md.)
apiVersion: v1
kind: ConfigMap
metadata: { name: fluent-bit-sidecar, namespace: logging }
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush 1
        Parsers_File parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
    [INPUT]
        Name tail
        Path /var/log/fleet/*.log
        Tag fleet.*
        Parser fleet_json
        Refresh_Interval 1
        DB /var/log/fleet/.flb.db
    [FILTER]
        Name record_modifier
        Match fleet.*
        Record host ${HOSTNAME}
        Record collector fluent-bit-sidecar
    [OUTPUT]
        Name http
        Match fleet.*
        Host log-shipper
        Port 8080
        URI /ingest
        Format json
        Header Content-Type application/json
        Retry_Limit 10
  parsers.conf: |
    [PARSER]
        Name fleet_json
        Format json
---
# --- helper anchor via YAML is not portable across kubectl; we repeat the 4
#     Deployments explicitly. They differ only in name / module / port / env. ---
apiVersion: v1
kind: Service
metadata: { name: auth, namespace: logging }
spec: { selector: { app: auth }, ports: [ { port: 8001, targetPort: 8001 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: auth, namespace: logging }
spec:
  replicas: 1
  selector: { matchLabels: { app: auth } }
  template:
    metadata: { labels: { app: auth } }
    spec:
      containers:
        - name: auth
          image: fleet:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn","auth.main:app","--host","0.0.0.0","--port","8001"]
          env: [ { name: LOG_DIR, value: /var/log/fleet } ]
          ports: [ { containerPort: 8001 } ]
          volumeMounts: [ { name: logs, mountPath: /var/log/fleet } ]
        - name: fluent-bit
          image: fluent/fluent-bit:3.1.9
          volumeMounts:
            - { name: logs, mountPath: /var/log/fleet }
            - { name: fbcfg, mountPath: /fluent-bit/etc }
      volumes:
        - { name: logs, emptyDir: {} }
        - { name: fbcfg, configMap: { name: fluent-bit-sidecar } }
---
