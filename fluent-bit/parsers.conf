[PARSER]
    # Each fleet log line is already a JSON object (NDJSON). Parsing it turns the
    # fields into first-class record keys that filters and the shipper can read.
    #
    # We deliberately do NOT map a Time_Key here: our records carry an ISO8601
    # `timestamp` string that the downstream Flink job parses itself for
    # event-time. Letting Fluent Bit use ingestion time internally avoids noisy
    # per-record time-parse warnings and keeps the original timestamp intact.
    Name    fleet_json
    Format  json
