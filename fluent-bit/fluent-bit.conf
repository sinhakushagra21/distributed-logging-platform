[SERVICE]
    Flush         1
    Log_Level     info
    Parsers_File  parsers.conf
    # Built-in metrics endpoint (http://fluent-bit:2020) — the Stage 7 UI can
    # scrape input/output record counts from here.
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ---- INPUT: tail every service's log file on the shared volume -------------
[INPUT]
    Name              tail
    Path              /var/log/fleet/*.log
    Tag               fleet.*
    Parser            fleet_json
    Refresh_Interval  1
    # Read existing content on startup so demos don't require restarting the
    # fleet; in production you'd usually tail only new lines.
    Read_from_Head    true
    # Offset DB so restarts resume where we left off (no re-shipping).
    DB                /tmp/flb_fleet.db
    Skip_Long_Lines   On
    Mem_Buf_Limit     16MB

# ---- FILTER: attach collector metadata -------------------------------------
[FILTER]
    Name          record_modifier
    Match         fleet.*
    Record        host ${HOSTNAME}
    Record        collector fluent-bit

# ---- FILTER: mask sensitive fields at the edge -----------------------------
[FILTER]
    Name    lua
    Match   fleet.*
    script  mask.lua
    call    mask_fields

# ---- OUTPUT: hand records to the log-shipper, which encodes Protobuf --------
# Fluent Bit has a native Kafka output, but it can only emit JSON/MsgPack, not
# our custom Protobuf schema. So Fluent Bit does what it is best at (tail,
# enrich, mask) and posts JSON batches to the shipper, which owns Protobuf
# serialization + Kafka production. Retries give us at-least-once delivery to
# the shipper if it is briefly unavailable.
[OUTPUT]
    Name          http
    Match         fleet.*
    Host          log-shipper
    Port          8080
    URI           /ingest
    Format        json
    Header        Content-Type application/json
    Retry_Limit   10
