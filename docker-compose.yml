# Distributed logging platform — docker-compose (grows stage by stage).
# Stage 2 scope: mock fleet -> shared log volume -> Fluent Bit -> log-shipper
# (Protobuf) -> Kafka (KRaft, single broker).
#
# Lite profile by default (single broker, RF=1, 3 partitions) so it runs on
# ~8GB. docker-compose.full.yml (Stage 6) overrides for the scale demo.

x-fleet-env: &fleet-env
  LOG_DIR: /var/log/fleet
  BASE_ERROR_RATE: "0.02"
  WARN_RATE: "0.08"

services:
  # ------------------------------------------------------------------ Kafka
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    ports:
      - "29092:29092"   # host access (e.g. local tools) via PLAINTEXT_HOST
    environment:
      KAFKA_NODE_ID: 1
      # Combined mode: this one node is both broker and KRaft controller. No
      # ZooKeeper — the controller quorum replaces it.
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single-broker => every internal topic must have RF=1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  # Create topics once, then exit. Keeps partition/RF choices explicit and
  # versioned rather than relying on auto-create.
  kafka-init:
    image: apache/kafka:3.8.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        BS=kafka:9092
        # 'logs' fans out request logs across 3 partitions for consumer
        # parallelism; keyed by correlation_id so a request keeps its order.
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server $$BS --create --if-not-exists \
          --topic logs --partitions 3 --replication-factor 1
        # Dead-letter topic for records Flink cannot parse/validate (Stage 3).
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server $$BS --create --if-not-exists \
          --topic logs.dlq --partitions 1 --replication-factor 1
        echo "topics:"; /opt/kafka/bin/kafka-topics.sh --bootstrap-server $$BS --list

  # ------------------------------------------------------------ log-shipper
  log-shipper:
    build:
      context: .
      dockerfile: log-shipper/Dockerfile
    container_name: log-shipper
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: logs
    depends_on:
      kafka:
        condition: service_healthy

  # ------------------------------------------------------------- Fluent Bit
  fluent-bit:
    image: fluent/fluent-bit:3.1.9
    container_name: fluent-bit
    volumes:
      - fleet-logs:/var/log/fleet:ro
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./fluent-bit/mask.lua:/fluent-bit/etc/mask.lua:ro
    ports:
      - "2020:2020"   # Fluent Bit metrics endpoint
    depends_on:
      - log-shipper

  # -------------------------------------------------------- mock fleet (x4)
  auth:
    build:
      context: ./services
    environment: *fleet-env
    command: ["uvicorn", "auth.main:app", "--host", "0.0.0.0", "--port", "8001"]
    volumes:
      - fleet-logs:/var/log/fleet

  trip:
    build:
      context: ./services
    environment: *fleet-env
    command: ["uvicorn", "trip.main:app", "--host", "0.0.0.0", "--port", "8002"]
    volumes:
      - fleet-logs:/var/log/fleet

  payments:
    build:
      context: ./services
    environment: *fleet-env
    command: ["uvicorn", "payments.main:app", "--host", "0.0.0.0", "--port", "8003"]
    volumes:
      - fleet-logs:/var/log/fleet

  api-gateway:
    build:
      context: ./services
    environment:
      <<: *fleet-env
      AUTH_URL: http://auth:8001
      TRIP_URL: http://trip:8002
      PAYMENTS_URL: http://payments:8003
    command: ["uvicorn", "api_gateway.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"   # load generator hits this from the host
    volumes:
      - fleet-logs:/var/log/fleet
    depends_on:
      - auth
      - trip
      - payments

  # Optional in-cluster load generator (daemon w/ control API). Enable with:
  #   docker compose --profile load up loadgen
  loadgen:
    build:
      context: ./services
    profiles: ["load"]
    command: ["python", "loadgen/load_generator.py", "--serve", "--port", "9100",
              "--target", "http://api-gateway:8000", "--rps", "100"]
    ports:
      - "9100:9100"
    depends_on:
      - api-gateway

  # ------------------------------------------------------- Elasticsearch + init
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.18
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"     # keep heap small for the lite profile
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 18

  # Install the logs-* index template (mapping) so correlation_id is a keyword,
  # message is full-text, timestamp is a date, etc. (see index_template.json).
  es-init:
    image: curlimages/curl:8.10.1
    container_name: es-init
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./storage/elasticsearch/index_template.json:/tmp/tpl.json:ro
    entrypoint: ["sh", "-c",
      "curl -sf -XPUT http://elasticsearch:9200/_index_template/logs-template -H 'Content-Type: application/json' --data-binary @/tmp/tpl.json && echo ES-template-installed"]

  # --------------------------------------------------------------- TimescaleDB
  timescaledb:
    image: timescale/timescaledb:2.15.3-pg16
    container_name: timescaledb
    environment:
      POSTGRES_DB: metrics
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"   # host 5433 to avoid clashing with a local Postgres
    volumes:
      - ./storage/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ts-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # --------------------------------------------------------------- MinIO (S3)
  minio:
    image: minio/minio:latest    # production: pin a RELEASE.* tag
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c",
      "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/logs-archive && mc mb --ignore-existing local/flink-checkpoints && echo MinIO-buckets-ready"]

  # ------------------------------------------------------------- Flink (core)
  # Application mode: the JobManager runs our job directly from usrlib.
  flink-jobmanager:
    build:
      context: .
      dockerfile: flink-job/Dockerfile
    image: flink-job:latest
    container_name: flink-jobmanager
    command: standalone-job --job-classname com.observability.StreamingJob
    ports:
      - "8081:8081"    # Flink web UI + REST API (Stage 7 scrapes this)
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        state.backend: hashmap
        pekko.ask.timeout: 60s
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: logs
      KAFKA_DLQ_TOPIC: logs.dlq
      ES_HOST: elasticsearch
      ES_PORT: "9200"
      TIMESCALE_URL: jdbc:postgresql://timescaledb:5432/metrics
      TIMESCALE_USER: postgres
      TIMESCALE_PASSWORD: postgres
      PARQUET_PATH: s3a://logs-archive/enriched
      # Checkpoints go to object storage (MinIO) — production-correct (shared,
      # durable, accessible by JobManager + all TaskManagers) and it avoids
      # local-volume permission issues.
      CHECKPOINT_DIR: s3://flink-checkpoints/checkpoints
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      minio:
        condition: service_healthy

  flink-taskmanager:
    image: flink-job:latest
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        state.backend: hashmap
        pekko.ask.timeout: 60s
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
    depends_on:
      - flink-jobmanager

  # ------------------------------------------------------- Dashboards (Stage 5)
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./dashboards/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - timescaledb

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.18
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  # Creates the Kibana data view (index pattern) logs-* so you can search
  # immediately. Runs once Kibana is reachable.
  kibana-init:
    image: curlimages/curl:8.10.1
    container_name: kibana-init
    depends_on:
      - kibana
    entrypoint: ["sh", "-c",
      "for i in $$(seq 1 60); do curl -sf -XPOST http://kibana:5601/api/data_views/data_view -H 'kbn-xsrf: true' -H 'Content-Type: application/json' -d '{\"data_view\":{\"title\":\"logs-*\",\"name\":\"Fleet logs\",\"timeFieldName\":\"@timestamp\"}}' && echo KIBANA-dataview-created && exit 0; echo waiting-for-kibana; sleep 5; done; echo kibana-init-timeout"]

  # ------------------------------------------------- Control UI + metrics API
  control-api:
    build:
      context: .
      dockerfile: control-api/Dockerfile
    container_name: control-api
    ports:
      - "8090:8090"    # the live demo UI + its API
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: logs
      FLINK_GROUP: flink-log-processor
      FLINK_URL: http://flink-jobmanager:8081
      ES_URL: http://elasticsearch:9200
      TIMESCALE_DSN: host=timescaledb port=5432 dbname=metrics user=postgres password=postgres
      LOADGEN_URL: http://loadgen:9100
      SERVICE_URLS: http://api-gateway:8000,http://auth:8001,http://trip:8002,http://payments:8003
    depends_on:
      - kafka
      - timescaledb

volumes:
  fleet-logs:
  es-data:
  ts-data:
  minio-data:
  grafana-data:
